name: Build & deploy site

on:
  push:
    branches: [main, "claude/zen-mendel-w888uy"]
  workflow_dispatch:
  schedule:
    # Daily export to GitHub Pages (the "cron export criteria").
    # NOTE: scheduled workflows only run from the repository's DEFAULT branch.
    - cron: "0 6 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let a running one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Install pandoc + LaTeX (for PDF/DOCX export)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc texlive-xetex texlive-fonts-recommended texlive-plain-generic

      - name: Build everything (validate → math → paper → site → exports)
        run: bash Scripts/build_all.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
