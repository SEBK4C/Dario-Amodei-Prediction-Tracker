  - id: ai_90pct_code_3to6_months
    theme: coding
    quote: "I think we will be there in three to six months, where AI is writing 90 percent of the code. And then, in 12 months, we may be in a world where AI is writing essentially all of the code."
    speaker: Dario Amodei
    date_said: 2025-03-10
    venue: "CEO Speaker Series, Council on Foreign Relations (moderated by Michael Froman)"
    primary_url: "https://www.cfr.org/event/ceo-speaker-series-dario-amodei-anthropic"
    archive_url: ""
    predicted_horizon_verbatim: "3 to 6 months (90%); 12 months (essentially all)"
    predicted_date: 2026-03-10
    status: partially
    resolved_date: 2025-10-15
    confidence: high
    tags: [recursive_self_improvement]
    evidence:
      - url: "https://www.anthropic.com/institute/recursive-self-improvement"
        date: 2026-06-04
        note: "Anthropic 'When AI Builds Itself' report: >80% of code merged into production in May 2026 authored by Claude."
      - url: "https://devops.com/google-ceo-says-75-of-new-code-is-ai-generated/"
        date: 2026-04-22
        note: "Google: 75% of new code AI-generated (engineer-approved) — high but short of 'essentially all' industry-wide."
    notes: >-
      Date confirmed (CFR, Mon 2025-03-10). PARTIALLY: the 90% figure holds
      inside Anthropic and some partners (Amodei reaffirmed at Dreamforce
      2025-10-15; Anthropic's June 2026 report shows >80% of merged production
      code is Claude-authored), but the stronger 'essentially all code' /
      industry-wide claim (12-month window ending 2026-03-10) did not hold —
      major firms were at ~30-75%. resolved_date = the 2025-10-15 reaffirmation.

